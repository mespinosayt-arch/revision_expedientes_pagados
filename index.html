<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta Expedientes ANID</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    body{
      font-family: Arial, sans-serif;
      background:#f4f6f9;
      padding:40px;
    }

    .box{
      background:white;
      max-width:800px;
      margin:auto;
      padding:30px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      color:#0033A0;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:6px;
    }

    button{
      margin-top:10px;
      padding:12px 20px;
      border:none;
      background:#0033A0;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    .resultado{
      margin-top:20px;
      padding:20px;
      background:#eef3ff;
      border-radius:8px;
      display:none;
    }

    .ok{
      color:green;
      margin-top:15px;
    }

    .error{
      color:red;
      margin-top:15px;
    }

  </style>

</head>

<body>

<div class="box">

  <h1>Consulta Expedientes ANID</h1>

  <input type="text" id="ted" placeholder="Ejemplo: E648/2026">

  <button onclick="buscarExpediente()">
    Buscar
  </button>

  <div id="estado"></div>

  <div id="resultado" class="resultado"></div>

</div>

<script>

const SUPABASE_URL = 'https://elwugzjpfpxjyoyeeoaf.supabase.co';

const SUPABASE_KEY = 'sb_publishable_imAQfXVuTQYav4-KM5R1rg_1eJnm8t5';

const clienteSupabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

window.onload = async () => {

  const estado = document.getElementById('estado');

  try {

    const { data, error } = await clienteSupabase
      .from('expedientes')
      .select('*')
      .limit(1);

    if(error){

      console.error(error);

      estado.innerHTML = '<div class="error">❌ Error conectando con Supabase</div>';

      return;

    }

    estado.innerHTML = '<div class="ok">✅ Conectado correctamente a Supabase</div>';

  } catch(err){

    console.error(err);

    estado.innerHTML = '<div class="error">❌ Error general</div>';

  }

};

async function buscarExpediente(){

  const ted = document.getElementById('ted').value.trim();

  const resultado = document.getElementById('resultado');

  resultado.style.display = 'none';

  if(!ted){

    alert('Ingresa un TED');

    return;

  }

  try {

    const { data, error } = await clienteSupabase
      .from('expedientes')
      .select('*')
      .eq('numero_ted', ted);

    if(error){

      console.error(error);

      alert('Error consultando');

      return;

    }

    if(data.length === 0){

      resultado.style.display = 'block';

      resultado.innerHTML = `
        <h3>No encontrado</h3>
        <p>No existe el TED ${ted}</p>
      `;

      return;

    }

    const d = data[0];

    resultado.style.display = 'block';

    resultado.innerHTML = `
      <h2>Expediente Encontrado</h2>

      <p><strong>TED:</strong> ${d.numero_ted || '-'}</p>

      <p><strong>Fecha ingreso:</strong> ${d.fecha_ingreso || '-'}</p>

      <p><strong>Fecha pago:</strong> ${d.fecha_pago || '-'}</p>

      <p><strong>Analista:</strong> ${d.analista || '-'}</p>

      <p><strong>Monto:</strong> ${d.monto_total || '-'}</p>

      <p><strong>Moneda:</strong> ${d.moneda || '-'}</p>

      <p><strong>Tipo pago:</strong> ${d.tipo_pago || '-'}</p>

      <p><strong>Nómina:</strong> ${d.numero_nomina || '-'}</p>
    `;

  } catch(err){

    console.error(err);

    alert('Error general');

  }

}

</script>

</body>
</html>
